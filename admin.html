<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarMC Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0d0d0d; color: white; min-height: 100vh; }

        /* NAV */
        nav {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            background: #111;
            border-bottom: 2px solid #ff6a00;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #800020, #ff6a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .links a { color: white; text-decoration: none; font-size: 0.9rem; }
        .links a:hover { color: #ff6a00; }

        /* LOGIN */
        #loginScreen {
            min-height: calc(100vh - 70px);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: #171717;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 40px;
            width: 360px;
            text-align: center;
        }
        .login-box h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #800020, #ff6a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-box p { color: #666; font-size: 0.85rem; margin-bottom: 28px; }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            background: #222;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            margin-bottom: 14px;
            transition: border 0.2s;
        }
        .login-box input:focus { border-color: #ff6a00; }
        .login-error { color: #ff3b30; font-size: 0.85rem; margin-bottom: 10px; min-height: 20px; }

        /* ADMIN PANEL */
        #adminPanel { display: none; padding: 36px 8%; }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .panel-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #800020, #ff6a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .panel-header p { color: #666; font-size: 0.85rem; margin-top: 4px; }

        .btn-logout {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-logout:hover { color: white; border-color: #555; }

        /* MAIN GRID */
        .main-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        /* EDITOR CARD */
        .editor-card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 16px;
            padding: 24px;
            position: sticky;
            top: 90px;
        }
        .editor-card h3 { font-size: 1rem; color: #ff6a00; margin-bottom: 20px; font-weight: 700; }

        /* PLAYER INPUT */
        .player-input-wrap { position: relative; margin-bottom: 20px; }
        label {
            display: block;
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }
        .player-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 10px 14px;
            transition: border 0.2s;
        }
        .player-input-row:focus-within { border-color: #ff6a00; }
        .player-avatar {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .player-input-row input {
            background: none;
            border: none;
            color: white;
            font-size: 0.95rem;
            outline: none;
            flex: 1;
            font-family: 'Inter', sans-serif;
        }

        /* SUGGESTIONS */
        .suggestions-drop {
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            z-index: 50;
        }
        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            border-bottom: 1px solid #1e1e1e;
            transition: background 0.1s;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: #1e1e1e; }
        .suggestion-item img { width: 24px; height: 24px; border-radius: 5px; }

        /* KIT ROWS */
        .kits-section { margin-bottom: 20px; }
        .kit-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a1a;
            gap: 12px;
        }
        .kit-row:last-child { border-bottom: none; }
        .kit-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #ccc;
            min-width: 120px;
        }
        .kit-icon { font-size: 1rem; }
        .kit-select {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: white;
            padding: 7px 10px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            transition: border 0.2s;
            appearance: none;
            min-width: 90px;
            text-align: center;
        }
        .kit-select:focus { border-color: #ff6a00; }

        /* ACTION BUTTONS */
        .action-btns { display: flex; gap: 10px; margin-top: 4px; }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            transition: 0.2s;
        }
        .btn-save {
            background: linear-gradient(90deg, #800020, #ff6a00);
            color: white;
        }
        .btn-remove {
            background: #1a0808;
            color: #ff3b30;
            border: 1px solid #ff3b3030;
        }
        .btn:hover { opacity: 0.85; transform: scale(1.02); }

        /* FEEDBACK */
        .feedback {
            font-size: 0.82rem;
            margin-top: 12px;
            padding: 9px 12px;
            border-radius: 8px;
            display: none;
        }
        .feedback.success { display: block; background: #0a1f0a; color: #4caf50; }
        .feedback.error   { display: block; background: #1f0a0a; color: #ff3b30; }

        /* PLAYER TABLE */
        .table-card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 16px;
            overflow: hidden;
        }
        .table-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid #1e1e1e;
            flex-wrap: wrap;
            gap: 10px;
        }
        .table-top h3 { font-size: 1rem; color: #ff6a00; font-weight: 700; }
        #searchFilter {
            padding: 8px 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: white;
            outline: none;
            font-size: 0.85rem;
            width: 180px;
            transition: border 0.2s;
        }
        #searchFilter:focus { border-color: #ff6a00; }

        .table-header-row {
            display: grid;
            grid-template-columns: 36px 1fr 70px 70px 70px 70px 70px 80px;
            padding: 10px 16px;
            background: #0d0d0d;
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
            gap: 6px;
        }
        .table-player-row {
            display: grid;
            grid-template-columns: 36px 1fr 70px 70px 70px 70px 70px 80px;
            padding: 12px 16px;
            border-bottom: 1px solid #161616;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: background 0.1s;
        }
        .table-player-row:last-child { border-bottom: none; }
        .table-player-row:hover { background: #161616; }

        .tbl-head { width: 28px; height: 28px; border-radius: 6px; }
        .tbl-name { font-weight: 600; font-size: 0.88rem; }

        /* Kit badges in table */
        .kb {
            padding: 3px 8px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.68rem;
            display: inline-block;
            text-align: center;
        }
        .kb.ht1 { background: #ff3b30; color: white; }
        .kb.ht2 { background: #ff6a00; color: white; }
        .kb.ht3 { background: #ffb300; color: black; }
        .kb.lt1 { background: #cddc39; color: black; }
        .kb.lt2 { background: #00acc1; color: white; }
        .kb.lt3 { background: #555; color: white; }
        .kb.none { background: #1e1e1e; color: #444; }

        .tbl-edit-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #aaa;
            padding: 5px 10px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.15s;
        }
        .tbl-edit-btn:hover { background: #222; color: white; border-color: #ff6a00; }

        .empty-state { text-align: center; padding: 40px; color: #333; font-size: 0.9rem; }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid #222;
            border-top-color: #ff6a00;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            #adminPanel { padding: 20px 14px; }
            nav { padding: 0 5%; }
            .logo { font-size: 1.4rem; }
            .table-header-row, .table-player-row {
                grid-template-columns: 30px 1fr 55px 55px 55px 55px 55px 65px;
                font-size: 0.72rem;
                padding: 10px 10px;
                gap: 4px;
            }
            .kb { font-size: 0.6rem; padding: 2px 5px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Admin</div>
    <div class="links"><a href="index.html">← Back to Site</a></div>
</nav>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="login-box">
        <h2>Admin Panel</h2>
        <p>SonarMC Tier List — Staff only</p>
        <input type="password" id="passwordInput" placeholder="Enter password"
            onkeydown="if(event.key==='Enter') login()">
        <div class="login-error" id="loginError"></div>
        <button style="width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(90deg,#800020,#ff6a00);color:white;font-size:1rem;font-weight:700;cursor:pointer;" onclick="login()">Login</button>
    </div>
</div>

<!-- ADMIN -->
<div id="adminPanel">

    <div class="panel-header">
        <div>
            <h1>Admin Panel</h1>
            <p>Manage players and tier rankings</p>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <div class="main-grid">

        <!-- EDITOR -->
        <div class="editor-card">
            <h3>✏️ Edit Player</h3>

            <div class="player-input-wrap">
                <label>Username</label>
                <div class="player-input-row">
                    <img id="editorHead" class="player-avatar"
                        src="https://minotar.net/avatar/steve/64"
                        onerror="this.src='https://minotar.net/avatar/steve/64'">
                    <input id="editorName" type="text" placeholder="Search or type username..."
                        oninput="onNameInput()" onkeydown="onNameKey(event)" autocomplete="off">
                </div>
                <div class="suggestions-drop" id="editorSuggestions" style="display:none"></div>
            </div>

            <div class="kits-section">
                <label style="margin-bottom:12px">Kit Rankings</label>
                <div id="kitRows"></div>
            </div>

            <div class="action-btns">
                <button class="btn btn-save" onclick="savePlayer()">Save</button>
                <button class="btn btn-remove" onclick="removePlayer()">Remove</button>
            </div>

            <div class="feedback" id="editorFeedback"></div>
        </div>

        <!-- PLAYER TABLE -->
        <div class="table-card">
            <div class="table-top">
                <h3>👥 Players (<span id="playerCount">0</span>)</h3>
                <input id="searchFilter" placeholder="Filter by name..." oninput="filterTable()">
            </div>

            <div class="table-header-row">
                <div></div>
                <div>Player</div>
                <div>Sword</div>
                <div>Axe</div>
                <div>Spear</div>
                <div>Elytra</div>
                <div>Crystal</div>
                <div>Edit</div>
            </div>

            <div id="playerTableBody">
                <div class="empty-state"><span class="spinner"></span> Loading...</div>
            </div>
        </div>

    </div>
</div>

<script>
    const API = "https://tier-api.onrender.com";
    const STEVE = "https://minotar.net/avatar/steve/64";
    const getHead = n => `https://minotar.net/avatar/${n}/64`;

    const KITS = [
        { key: "sword",      label: "Sword",      icon: "⚔️" },
        { key: "axe",        label: "Axe",        icon: "🪓" },
        { key: "spearMace",  label: "Spear/Mace", icon: "🔱" },
        { key: "elytraMace", label: "Elytra",     icon: "🦅" },
        { key: "crystal",    label: "Crystal",    icon: "💎" }
    ];
    const RANKS = ["HT1", "HT2", "HT3", "LT1", "LT2", "LT3"];

    let allPlayers = {};

    // Build kit rows
    function buildKitRows(playerData = {}) {
        document.getElementById("kitRows").innerHTML = KITS.map(k => `
            <div class="kit-row">
                <div class="kit-label">
                    <span class="kit-icon">${k.icon}</span>
                    ${k.label}
                </div>
                <select class="kit-select" id="kit_${k.key}">
                    <option value="">— Skip —</option>
                    ${RANKS.map(r => `<option value="${r}" ${playerData[k.key] === r ? "selected" : ""}>${r}</option>`).join("")}
                </select>
            </div>
        `).join("");
    }

    buildKitRows();

    // =========================
    // AUTH
    // =========================
    function getToken() { return sessionStorage.getItem("adminToken"); }
    function setToken(t) { sessionStorage.setItem("adminToken", t); }
    function clearToken() { sessionStorage.removeItem("adminToken"); }
    function authHeaders() {
        return { "Content-Type": "application/json", "x-admin-token": getToken() };
    }

    async function login() {
        const password = document.getElementById("passwordInput").value;
        const err = document.getElementById("loginError");
        err.textContent = "Logging in...";
        try {
            const res = await fetch(`${API}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (data.success) { setToken(data.token); showPanel(); }
            else { err.textContent = data.error || "Wrong password."; document.getElementById("passwordInput").value = ""; }
        } catch { err.textContent = "Could not reach server."; }
    }

    async function logout() {
        try { await fetch(`${API}/logout`, { method: "POST", headers: authHeaders() }); } catch {}
        clearToken(); showLogin();
    }

    function showPanel() {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        loadPlayers();
    }
    function showLogin() {
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("adminPanel").style.display = "none";
        document.getElementById("passwordInput").value = "";
        document.getElementById("loginError").textContent = "";
    }

    if (getToken()) showPanel();

    // =========================
    // LOAD PLAYERS
    // =========================
    async function loadPlayers() {
        try {
            const res = await fetch(`${API}/players`);
            allPlayers = await res.json();
            renderTable(allPlayers);
        } catch {
            document.getElementById("playerTableBody").innerHTML =
                `<div class="empty-state" style="color:#ff3b30">⚠️ Could not connect to API.</div>`;
        }
    }

    // =========================
    // NAME INPUT & AUTOCOMPLETE
    // =========================
    function onNameInput() {
        const val = document.getElementById("editorName").value.trim();

        // Update head preview
        document.getElementById("editorHead").src = val ? getHead(val) : STEVE;

        // Suggestions
        const box = document.getElementById("editorSuggestions");
        if (!val) { box.style.display = "none"; return; }

        const matches = Object.keys(allPlayers)
            .filter(n => n.toLowerCase().includes(val.toLowerCase()))
            .slice(0, 6);

        if (matches.length === 0) { box.style.display = "none"; return; }

        box.innerHTML = matches.map(n => `
            <div class="suggestion-item" onclick="selectPlayer('${n}')">
                <img src="${getHead(n)}" onerror="this.src='${STEVE}'">
                ${n}
            </div>
        `).join("");
        box.style.display = "block";
    }

    function onNameKey(e) {
        if (e.key === "Escape") {
            document.getElementById("editorSuggestions").style.display = "none";
        }
    }

    function selectPlayer(name) {
        document.getElementById("editorName").value = name;
        document.getElementById("editorHead").src = getHead(name);
        document.getElementById("editorSuggestions").style.display = "none";

        // Auto-fill kit dropdowns with existing data
        const p = allPlayers[name] || {};
        buildKitRows(p);
    }

    // Close suggestions when clicking outside
    document.addEventListener("click", e => {
        if (!e.target.closest(".player-input-wrap")) {
            document.getElementById("editorSuggestions").style.display = "none";
        }
    });

    // =========================
    // SAVE PLAYER
    // =========================
    async function savePlayer() {
        const player = document.getElementById("editorName").value.trim();
        const fb = document.getElementById("editorFeedback");

        if (!player) { showFeedback(fb, "error", "Enter a username."); return; }

        // Collect only kits that have a rank selected
        const updates = KITS.filter(k => document.getElementById(`kit_${k.key}`).value);

        if (updates.length === 0) { showFeedback(fb, "error", "Select at least one kit rank."); return; }

        let saved = 0;
        for (const k of updates) {
            const rank = document.getElementById(`kit_${k.key}`).value;
            try {
                const res = await fetch(`${API}/set`, {
                    method: "POST",
                    headers: authHeaders(),
                    body: JSON.stringify({ player, kit: k.key, rank })
                });
                const data = await res.json();
                if (res.status === 401) { clearToken(); showLogin(); return; }
                if (data.success) saved++;
            } catch {}
        }

        if (saved > 0) {
            showFeedback(fb, "success", `✓ Saved ${saved} kit${saved > 1 ? "s" : ""} for ${player}`);
            await loadPlayers();
            // Refresh dropdowns with new data
            if (allPlayers[player]) buildKitRows(allPlayers[player]);
        } else {
            showFeedback(fb, "error", "Something went wrong.");
        }
    }

    // =========================
    // REMOVE PLAYER
    // =========================
    async function removePlayer() {
        const player = document.getElementById("editorName").value.trim();
        const fb = document.getElementById("editorFeedback");

        if (!player) { showFeedback(fb, "error", "Enter a username to remove."); return; }
        if (!confirm(`Remove ${player} from the tier list?`)) return;

        try {
            const res = await fetch(`${API}/remove`, {
                method: "POST",
                headers: authHeaders(),
                body: JSON.stringify({ player })
            });
            const data = await res.json();
            if (res.status === 401) { clearToken(); showLogin(); return; }
            if (data.success) {
                showFeedback(fb, "success", `✓ ${player} removed.`);
                document.getElementById("editorName").value = "";
                document.getElementById("editorHead").src = STEVE;
                buildKitRows();
                await loadPlayers();
            } else {
                showFeedback(fb, "error", data.error || "Player not found.");
            }
        } catch { showFeedback(fb, "error", "Could not reach API."); }
    }

    // =========================
    // TABLE
    // =========================
    function kb(rank) {
        if (!rank) return `<span class="kb none">—</span>`;
        return `<span class="kb ${rank.toLowerCase()}">${rank}</span>`;
    }

    function renderTable(players) {
        const body = document.getElementById("playerTableBody");
        const entries = Object.entries(players);
        document.getElementById("playerCount").textContent = entries.length;

        if (entries.length === 0) {
            body.innerHTML = `<div class="empty-state">No players yet.</div>`;
            return;
        }

        body.innerHTML = entries.map(([name, p]) => `
            <div class="table-player-row" onclick="selectPlayer('${name}')">
                <img class="tbl-head" src="${getHead(name)}" onerror="this.src='${STEVE}'">
                <div class="tbl-name">${name}</div>
                <div>${kb(p.sword)}</div>
                <div>${kb(p.axe)}</div>
                <div>${kb(p.spearMace)}</div>
                <div>${kb(p.elytraMace)}</div>
                <div>${kb(p.crystal)}</div>
                <div><button class="tbl-edit-btn" onclick="event.stopPropagation();selectPlayer('${name}')">Edit</button></div>
            </div>
        `).join("");
    }

    function filterTable() {
        const q = document.getElementById("searchFilter").value.toLowerCase();
        const filtered = Object.fromEntries(
            Object.entries(allPlayers).filter(([n]) => n.toLowerCase().includes(q))
        );
        renderTable(filtered);
    }

    // =========================
    // FEEDBACK
    // =========================
    function showFeedback(el, type, msg) {
        el.textContent = msg;
        el.className = `feedback ${type}`;
        clearTimeout(el._t);
        el._t = setTimeout(() => { el.className = "feedback"; el.textContent = ""; }, 4000);
    }
</script>
</body>
</html>
